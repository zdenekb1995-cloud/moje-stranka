<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4U Centre Apartments - Kalendář obsazenosti</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .apartments {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        .apartment {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            flex: 1;
            min-width: 350px;
        }

        .apartment h2 {
            text-align: center;
            color: #2980b9;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }

        .calendar {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .calendar th {
            background: #34495e;
            color: white;
            padding: 10px;
            font-weight: normal;
            width: 14.28%;
        }

        .calendar td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 12px 4px;
            cursor: pointer;
            transition: background 0.2s;
            background: white;
            color: #2c3e50;
            font-weight: 500;
        }

        .calendar td:hover {
            background: #ecf0f1;
        }

        .calendar td.blocked {
            background: #e74c3c;
            color: white;
            text-decoration: line-through;
            cursor: not-allowed;
        }

        .calendar td.blocked:hover {
            background: #c0392b;
        }

        .calendar td.today {
            border: 2px solid #f39c12;
            font-weight: bold;
        }

        .calendar td.other-month {
            color: #bdc3c7;
            background: #f9f9f9;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .month-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #2980b9;
        }

        button.refresh {
            background: #27ae60;
        }

        button.refresh:hover {
            background: #219a52;
        }

        .current-month {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 10px;
            background: #ecf0f1;
            border-radius: 8px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-color.blocked {
            background: #e74c3c;
        }

        .legend-color.available {
            background: white;
            border: 1px solid #ddd;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            background: #ecf0f1;
            border-radius: 8px;
            font-size: 12px;
            color: #7f8c8d;
        }

        .status.success {
            background: #d5f4e6;
            color: #27ae60;
        }

        .status.error {
            background: #fadbd8;
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .apartments {
                flex-direction: column;
            }
            .calendar td {
                padding: 8px 2px;
                font-size: 12px;
            }
            button {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏢 4U Centre Apartments</h1>
    <div class="subtitle">Kontrola obsazenosti apartmánů</div>

    <div class="controls" style="justify-content: center; margin-bottom: 20px;">
        <button class="refresh" id="refreshBtn">🔄 Obnovit termíny</button>
    </div>

    <div class="apartments">
        <!-- Apartmán A -->
        <div class="apartment">
            <h2>Apartmán A</h2>
            <div id="calendarA"></div>
        </div>

        <!-- Apartmán B -->
        <div class="apartment">
            <h2>Apartmán B</h2>
            <div id="calendarB"></div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color blocked"></div>
            <span>Blokovaný / Obsazený</span>
        </div>
        <div class="legend-item">
            <div class="legend-color available"></div>
            <span>Volný</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="border: 2px solid #f39c12; background: white;"></div>
            <span>Dnešek</span>
        </div>
    </div>

    <div id="statusMsg" class="status">📅 Klikněte na "Obnovit termíny" pro načtení dat</div>
</div>

<script>
    // Stav pro každý apartmán
    let availabilityA = [];
    let availabilityB = [];

    // Aktuální zobrazený měsíc (pro každý apartmán zvlášť)
    let currentDateA = new Date();
    let currentDateB = new Date();

    // API URL
    const API_URL = 'https://4ucentreapartments.xo.je/api_availability.php';

    // Hlavní funkce pro načtení dat z API (JSONP)
    function fetchAvailability(callback) {
        const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        const script = document.createElement('script');
        const url = `${API_URL}?callback=${callbackName}&_=${Date.now()}`;
        
        script.src = url;
        
        // Časový limit (10 sekund)
        const timeout = setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                if (script.parentNode) script.parentNode.removeChild(script);
                showStatus('❌ Chyba: Načítání trvá příliš dlouho', 'error');
                if (callback) callback(null);
            }
        }, 10000);
        
        window[callbackName] = function(data) {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
            
            if (data && data.success) {
                callback(data);
            } else {
                console.error('API error:', data);
                callback(null);
            }
        };
        
        document.body.appendChild(script);
    }

    // Aktualizace kalendáře po načtení dat
    function refreshAllCalendars() {
        showStatus('🔄 Načítám aktuální termíny...', '');
        
        fetchAvailability((data) => {
            if (data && data.availability) {
                // Aktualizace globálních polí
                availabilityA = data.availability.A || [];
                availabilityB = data.availability.B || [];
                
                const lastUpdate = data.last_update || 'neznámé';
                showStatus(`✅ Termíny aktualizovány! Naposledy: ${lastUpdate}`, 'success');
                
                // Překreslení kalendářů
                renderCalendar('A', currentDateA);
                renderCalendar('B', currentDateB);
            } else {
                showStatus('❌ Nepodařilo se načíst data. Zkontrolujte připojení.', 'error');
                console.error('Invalid data structure:', data);
            }
        });
    }

    // Vykreslení kalendáře pro konkrétní apartmán
    function renderCalendar(apartment, date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        
        const firstDayOfMonth = new Date(year, month, 1);
        const startWeekday = firstDayOfMonth.getDay(); // 0 = neděle
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Dny z předchozího měsíce
        const prevMonthDays = new Date(year, month, 0).getDate();
        
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        
        let calendarHtml = '<table class="calendar">';
        calendarHtml += '<tr><th>Po</th><th>Út</th><th>St</th><th>Čt</th><th>Pá</th><th>So</th><th>Ne</th></tr>';
        calendarHtml += '<tr>';
        
        // Prázdné buňky před prvním dnem v měsíci (přepočet na pondělí jako první den)
        let startOffset = (startWeekday === 0 ? 6 : startWeekday - 1);
        for (let i = 0; i < startOffset; i++) {
            const prevDate = prevMonthDays - startOffset + i + 1;
            calendarHtml += `<td class="other-month">${prevDate}</td>`;
        }
        
        // Dny v aktuálním měsíci
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            let isBlocked = false;
            
            if (apartment === 'A') {
                isBlocked = availabilityA.includes(dateStr);
            } else {
                isBlocked = availabilityB.includes(dateStr);
            }
            
            let cellClass = '';
            if (isBlocked) cellClass = 'blocked';
            if (dateStr === todayStr) cellClass += ' today';
            
            calendarHtml += `<td class="${cellClass}">${day}</td>`;
            
            // Nový řádek každých 7 dní
            if ((startOffset + day) % 7 === 0 && day !== daysInMonth) {
                calendarHtml += '</tr><tr>';
            }
        }
        
        // Doplň prázdné buňky na konci
        const totalCells = startOffset + daysInMonth;
        const remainingCells = 7 - (totalCells % 7);
        if (remainingCells < 7) {
            for (let i = 1; i <= remainingCells; i++) {
                calendarHtml += `<td class="other-month">${i}</td>`;
            }
        }
        
        calendarHtml += '</tr></table>';
        
        // Ovládací prvky pro měsíc
        const monthNames = ['Leden', 'Únor', 'Březen', 'Duben', 'Květen', 'Červen', 'Červenec', 'Srpen', 'Září', 'Říjen', 'Listopad', 'Prosinec'];
        const controlsHtml = `
            <div class="controls">
                <div class="month-nav">
                    <button onclick="changeMonth('${apartment}', -1)">◀ Předchozí</button>
                    <span class="current-month">${monthNames[month]} ${year}</span>
                    <button onclick="changeMonth('${apartment}', 1)">Další ▶</button>
                </div>
                <button onclick="changeMonth('${apartment}', 0)">Dnes</button>
            </div>
        `;
        
        const containerId = `calendar${apartment}`;
        document.getElementById(containerId).innerHTML = controlsHtml + calendarHtml;
    }
    
    // Změna měsíce
    function changeMonth(apartment, delta) {
        let targetDate;
        if (apartment === 'A') {
            targetDate = new Date(currentDateA);
            if (delta === 0) targetDate = new Date();
            else targetDate.setMonth(targetDate.getMonth() + delta);
            currentDateA = targetDate;
            renderCalendar('A', currentDateA);
        } else {
            targetDate = new Date(currentDateB);
            if (delta === 0) targetDate = new Date();
            else targetDate.setMonth(targetDate.getMonth() + delta);
            currentDateB = targetDate;
            renderCalendar('B', currentDateB);
        }
    }
    
    // Zobrazení stavové zprávy
    function showStatus(message, type) {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.textContent = message;
        statusDiv.className = 'status';
        if (type === 'success') statusDiv.classList.add('success');
        if (type === 'error') statusDiv.classList.add('error');
        
        // Pokud je to úspěch, schovat za 5 sekund
        if (type === 'success') {
            setTimeout(() => {
                if (statusDiv.classList.contains('success')) {
                    statusDiv.classList.remove('success');
                    statusDiv.textContent = '📅 Poslední aktualizace proběhla úspěšně';
                }
            }, 5000);
        }
    }
    
    // Inicializace při načtení stránky
    document.addEventListener('DOMContentLoaded', () => {
        // Tlačítko obnovy
        document.getElementById('refreshBtn').addEventListener('click', () => {
            refreshAllCalendars();
        });
        
        // Automatické načtení při prvním otevření
        refreshAllCalendars();
    });
</script>
</body>
</html>
