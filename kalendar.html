<script>
    // ============================================================
    //  KONFIGURACE - API pro CORS
    // ============================================================
    const API_URL = 'https://4ucentreapartments.xo.je/api_availability.php';
    
    let currentApartment = 'A';
    let currentDate      = new Date();
    let selectedDates    = [];
    let bookedDates      = { A: [], B: [] };
    const prices         = { A: 1890, B: 2250 };

    // ============================================================
    //  NAČTENÍ OBSAZENOSTI PŘES API (JSONP - bez CORS problémů)
    // ============================================================
    function loadDates() {
        const dot = document.getElementById('syncDot');
        const text = document.getElementById('syncText');
        dot.className = 'sync-dot warn';
        text.textContent = 'Načítám dostupnost…';

        // JSONP callback jméno (unikátní)
        const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        
        // Vytvoření script tagu pro JSONP
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=${callbackName}&_=${Date.now()}`;
        
        // Timeout pro případ, že API neodpoví
        const timeout = setTimeout(() => {
            if (window[callbackName]) {
                delete window[callbackName];
                if (script.parentNode) script.parentNode.removeChild(script);
                dot.className = 'sync-dot err';
                text.textContent = 'Chyba: API neodpovídá, zkuste to znovu';
                // Záložní data
                setFallbackData();
            }
        }, 10000);
        
        // Callback funkce
        window[callbackName] = function(data) {
            clearTimeout(timeout);
            delete window[callbackName];
            if (script.parentNode) script.parentNode.removeChild(script);
            
            if (data && data.success && data.availability) {
                // Načtení dat z API
                bookedDates.A = data.availability.A || [];
                bookedDates.B = data.availability.B || [];
                
                bookedDates.A.sort();
                bookedDates.B.sort();
                
                const lastUpdate = data.last_update || 'neznámé';
                const countA = bookedDates.A.length;
                const countB = bookedDates.B.length;
                
                text.textContent = `✓ Dostupnost načtena (A: ${countA}, B: ${countB}, naposledy ${lastUpdate})`;
                dot.className = 'sync-dot ok';
                
                console.log(`Apartmán A: ${countA} termínů, B: ${countB} termínů`);
            } else {
                throw new Error('Neplatná odpověď z API');
            }
            
            renderCalendar();
        };
        
        // Přidání scriptu do stránky
        document.body.appendChild(script);
    }
    
    // Záložní data při chybě
    function setFallbackData() {
        bookedDates.A = [
            "2026-04-03", "2026-04-04", "2026-04-05", "2026-04-06",
            "2026-04-09", "2026-04-10", "2026-04-11", "2026-04-16",
            "2026-04-17", "2026-04-18", "2026-04-19", "2026-04-20",
            "2026-04-21", "2026-04-22", "2026-04-23", "2026-04-24"
        ];
        bookedDates.B = [
            "2026-04-03", "2026-04-04", "2026-04-09", "2026-04-10",
            "2026-04-13", "2026-04-14", "2026-04-15", "2026-04-16"
        ];
        renderCalendar();
    }

    // ============================================================
    //  KALENDÁŘ
    // ============================================================
    function renderCalendar() {
        const year  = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay    = new Date(year, month, 1);
        const startWD     = firstDay.getDay();
        let offset        = startWD === 0 ? 6 : startWD - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today       = new Date().toISOString().slice(0, 10);

        let html = `
            <div class="calendar-header">
                <button id="prevMonth">&#9664;</button>
                <h4>${getMonthName(month)} ${year}</h4>
                <button id="nextMonth">&#9654;</button>
            </div>
            <div class="weekdays">
                <span>Po</span><span>Út</span><span>St</span><span>Čt</span><span>Pá</span><span>So</span><span>Ne</span>
            </div>
            <div class="calendar-days" id="calendarDays">`;

        for (let i = 0; i < offset; i++) {
            html += `<div class="calendar-day other-month disabled">${new Date(year, month, -offset + i + 1).getDate()}</div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr    = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const isBooked   = bookedDates[currentApartment].includes(dateStr);
            const isSelected = selectedDates.includes(dateStr);
            const isPast     = dateStr < today;

            let cls = 'calendar-day';
            let title = '';
            if (isPast)        { cls += ' disabled'; title = 'Minulý termín'; }
            else if (isBooked) { cls += ' booked disabled'; title = 'Obsazeno'; }
            else if (isSelected) { cls += ' selected'; title = 'Vybráno'; }
            else               { title = 'Volný termín'; }

            const onclick = (!isPast && !isBooked) ? `onclick="toggleDate('${dateStr}')"` : '';
            html += `<div class="${cls}" ${onclick} title="${title}">${d}</div>`;
        }

        const remaining = 42 - offset - daysInMonth;
        for (let i = 1; i <= remaining; i++) {
            html += `<div class="calendar-day other-month disabled">${i}</div>`;
        }
        html += `</div>`;
        document.getElementById('calendar').innerHTML = html;

        document.getElementById('prevMonth')?.addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
            renderCalendar();
        });
        document.getElementById('nextMonth')?.addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            renderCalendar();
        });
    }

    function getMonthName(m) {
        return ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'][m];
    }

    function toggleDate(dateStr) {
        const idx = selectedDates.indexOf(dateStr);
        if (idx === -1) { selectedDates.push(dateStr); selectedDates.sort(); }
        else selectedDates.splice(idx, 1);
        updateSelectedUI(); renderCalendar(); updatePricePreview();
    }

    function updateSelectedUI() {
        const c = document.getElementById('selectedDatesList');
        if (!c) return;
        if (selectedDates.length === 0) {
            c.innerHTML = '<span class="date-badge">📅 Zatím žádné termíny</span>';
        } else {
            c.innerHTML = [...selectedDates].sort().map(d =>
                `<span class="date-badge">${d.split('-')[2]}.${d.split('-')[1]}.${d.split('-')[0]}</span>`
            ).join('');
        }
    }

    function clearDates() {
        selectedDates = []; updateSelectedUI(); renderCalendar(); updatePricePreview();
    }

    function updatePricePreview() {
        const el = document.getElementById('priceDisplay');
        if (!el) return;
        const n = selectedDates.length;
        el.innerText = n === 0 ? '— Kč' : `${(prices[currentApartment] * n).toLocaleString('cs-CZ')} Kč / ${n} nocí`;
    }

    function switchApartment(apt) {
        currentApartment = apt;
        selectedDates = [];
        updateSelectedUI(); renderCalendar(); updatePricePreview();
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.getAttribute('data-apartment') === apt
                ? b.classList.add('active')
                : b.classList.remove('active');
        });
        const gs = document.getElementById('guests');
        const opt3 = gs.querySelector('option[value="3"]');
        opt3.disabled = (apt !== 'B');
        if (apt !== 'B' && gs.value === '3') gs.value = '2';
    }

    // ============================================================
    //  FORMULÁŘ – odeslání poptávky
    // ============================================================
    document.getElementById('bookingForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullName = document.getElementById('fullName').value.trim();
        const email    = document.getElementById('email').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const guests   = document.getElementById('guests').value;
        const note     = document.getElementById('note').value;
        const msgDiv   = document.getElementById('formMessage');

        if (!fullName || !email || !phone) {
            msgDiv.className = 'message error';
            msgDiv.innerText = '❌ Vyplňte prosím jméno, e-mail a telefon.'; return;
        }
        if (selectedDates.length === 0) {
            msgDiv.className = 'message error';
            msgDiv.innerText = '❌ Vyberte alespoň jeden termín pobytu v kalendáři.'; return;
        }
        msgDiv.className = ''; msgDiv.style.display = 'block';
        msgDiv.innerText = '⏳ Odesílám poptávku…';

        try {
            await new Promise(r => setTimeout(r, 500));
            let all = [];
            try { all = JSON.parse(localStorage.getItem('4u_bookings') || '[]'); } catch(e) {}
            all.push({
                id: Date.now(),
                apartment: currentApartment === 'A' ? 'Apartmán A (bez terasy)' : 'Apartmán B (s terasou)',
                dates: [...selectedDates], nights: selectedDates.length,
                fullName, email, phone, guests, note,
                created: new Date().toISOString()
            });
            try { localStorage.setItem('4u_bookings', JSON.stringify(all)); } catch(e) {}

            msgDiv.className = 'message success';
            msgDiv.innerText = `✅ Děkujeme, ${fullName}! Vaše nezávazná poptávka byla přijata. Do 24 hodin Vás budeme kontaktovat na e-mail ${email} s potvrzením termínu a cenou.`;
            document.getElementById('bookingForm').reset();
            selectedDates = []; updateSelectedUI(); renderCalendar(); updatePricePreview();
            document.getElementById('guests').querySelector('option[value="3"]').disabled = (currentApartment !== 'B');
        } catch(err) {
            msgDiv.className = 'message error';
            msgDiv.innerText = '❌ Omlouváme se, technická chyba. Kontaktujte nás telefonicky.';
        }
    });

    // ============================================================
    //  OVLÁDACÍ PRVKY
    // ============================================================
    document.getElementById('clearDatesBtn')?.addEventListener('click', clearDates);
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchApartment(btn.getAttribute('data-apartment')));
    });

    // Tlačítko pro ruční obnovení - OKAMŽITÉ NAČTENÍ
    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
            console.log('🔄 Ruční obnovení kalendáře...');
            loadDates();  // Toto teď volá API správně
        });
    }

    // Mobilní menu
    const mobileBtn  = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (mobileBtn && mobileMenu) {
        mobileBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
        mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => mobileMenu.classList.remove('open')));
    }

    // ============================================================
    //  START
    // ============================================================
    updateSelectedUI();
    updatePricePreview();
    const guestsSelect = document.getElementById('guests');
    if (guestsSelect) {
        const opt3 = guestsSelect.querySelector('option[value="3"]');
        if (opt3) opt3.disabled = true;
    }
    loadDates();
    
    // Automatické obnovování každých 30 sekund
    setInterval(() => {
        console.log('🔄 Automatické obnovení kalendáře...');
        loadDates();
    }, 30000);
</script>
